version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: movix-postgres
    environment:
      POSTGRES_DB: movix
      POSTGRES_USER: movix
      POSTGRES_PASSWORD: movix123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - movix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movix"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movix-backend
    environment:
      DATABASE_URL: postgres://movix:movix123@postgres:5432/movix?sslmode=disable
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 8080
      ENVIRONMENT: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - movix-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movix-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - movix-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: movix-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@movix.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - movix-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  movix-network:
    driver: bridge

