version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: movix-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-movix}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movix_network

  # DbGate - Database Administration Tool
  dbgate:
    image: dbgate/dbgate:latest
    container_name: movix_dbgate
    restart: unless-stopped
    ports:
      - "3001:3000"  # Porta 3001 para evitar conflito com Next.js
    environment:
      CONNECTIONS: con1
      LABEL_con1: Movix PostgreSQL
      SERVER_con1: postgres
      USER_con1: ${POSTGRES_USER:-postgres}
      PASSWORD_con1: ${POSTGRES_PASSWORD:-postgres}
      PORT_con1: 5432
      ENGINE_con1: postgres@dbgate-plugin-postgres
      DATABASE_con1: ${POSTGRES_DB:-movix}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - movix_network

networks:
  movix_network:
    driver: bridge

volumes:
  postgres_data:

